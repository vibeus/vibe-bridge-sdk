name: Release @vibeus/bridge-contracts

on:
  push:
    tags:
      - "contracts-v*"
  workflow_dispatch:
    inputs:
      dry-run:
        description: "Run npm publish with --dry-run"
        type: boolean
        default: false

concurrency:
  group: release-contracts-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify tag matches package version
        if: startsWith(github.ref, 'refs/tags/')
        working-directory: packages/contracts
        run: |
          tag="${GITHUB_REF#refs/tags/contracts-v}"
          pkg=$(node -p "require('./package.json').version")
          if [ "$tag" != "$pkg" ]; then
            echo "Tag version ($tag) does not match package.json version ($pkg)" >&2
            exit 1
          fi

      - name: Lint & typecheck
        run: |
          bun run check
          bun run typecheck

      - name: Build & prepare publish bundle
        working-directory: packages/contracts
        run: bun run prepare-publish

      - name: Publish
        working-directory: packages/contracts/dist
        run: |
          if [ "${{ inputs.dry-run }}" = "true" ]; then
            npm publish --provenance --access public --dry-run
          else
            npm publish --provenance --access public
          fi
