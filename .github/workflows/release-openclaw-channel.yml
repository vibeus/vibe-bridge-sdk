name: Release @vibeus/openclaw-channel

on:
  push:
    tags:
      - "openclaw-channel-v*"
  workflow_dispatch:
    inputs:
      dry-run:
        description: "Run clawhub publish with --dry-run"
        type: boolean
        default: false

concurrency:
  group: release-openclaw-channel-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish to ClawHub
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CLAWHUB_CLI_VERSION: "0.12.3"
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify tag matches package version
        if: startsWith(github.ref, 'refs/tags/')
        working-directory: packages/openclaw-channel
        run: |
          tag="${GITHUB_REF#refs/tags/openclaw-channel-v}"
          pkg=$(node -p "require('./package.json').version")
          if [ "$tag" != "$pkg" ]; then
            echo "Tag version ($tag) does not match package.json version ($pkg)" >&2
            exit 1
          fi

      - name: Lint & typecheck
        run: |
          bun run check
          bun run typecheck

      - name: Build
        working-directory: packages/openclaw-channel
        run: bun run build

      - name: Authenticate with ClawHub
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
        run: |
          if [ -z "$CLAWHUB_TOKEN" ]; then
            echo "CLAWHUB_TOKEN secret is not configured" >&2
            exit 1
          fi
          bunx "clawhub@${CLAWHUB_CLI_VERSION}" login --token "$CLAWHUB_TOKEN" --no-browser

      - name: Publish
        run: |
          args=(
            --family code-plugin
            --display-name "Vibe Bridge"
            --source-repo "$GITHUB_REPOSITORY"
            --source-commit "$GITHUB_SHA"
            --source-ref "$GITHUB_REF_NAME"
            --source-path packages/openclaw-channel
          )
          if [ "${{ inputs.dry-run }}" = "true" ]; then
            args+=(--dry-run)
          fi
          bunx "clawhub@${CLAWHUB_CLI_VERSION}" package publish "${args[@]}" packages/openclaw-channel
